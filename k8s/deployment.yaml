apiVersion: apps/v1
kind: Deployment
metadata:
  name: "kkkjjjjj"
  namespace: "agents-hhhh"
  labels:
    app: "kkkjjjjj"
    team: "hhhh"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "kkkjjjjj"
  template:
    metadata:
      labels:
        app: "kkkjjjjj"
        team: "hhhh"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-kkkjjjjj"
      containers:
        - name: "kkkjjjjj"
          image: "acrshoppoc.azurecr.io/agents/kkkjjjjj:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-kkkjjjjj"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
